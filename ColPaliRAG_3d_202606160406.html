    const darkLabels = true;

    const Graph = ForceGraph3D()
      (document.getElementById('graph'))
      .graphData(graphData)
      .nodeColor(node => node.color)
      .nodeVal(node => node.size)
      .nodeLabel(node => node.tooltip)
      .linkDirectionalArrowLength(3.5)
      .linkDirectionalArrowRelPos(1)
      .linkColor(() => 'rgba(150,150,150,0.6)')
      .linkWidth(0.5)
      .enableNodeDrag(true)
      .enableNavigationControls(true);

    // Add text labels if SpriteText is available
    if (typeof SpriteText !== 'undefined') {
      Graph
        .nodeThreeObjectExtend(true)
        .nodeThreeObject(node => {
          const sprite = new SpriteText(node.label.replace(/\\n/g, '\n'));
          sprite.color = darkLabels ? 'white' : '#333';
          sprite.backgroundColor = darkLabels ? 'rgba(0,0,0,0.8)' : 'rgba(255,255,255,0.7)';
          sprite.padding = 1.5;
          sprite.textHeight = 3;
          sprite.position.y = 6;
          return sprite;
        });
    }

    // Configure FR-like forces
    Graph.d3Force('charge').strength(-120);
    Graph.d3Force('link').distance(50);

    // Ctrl+Click to remove node, its edges, and any newly-isolated nodes
    Graph.onNodeClick((node, event) => {
      if (event.ctrlKey) {
        const data = Graph.graphData();
        const remainingLinks = data.links.filter(l =>
          l.source.id !== node.id && l.target.id !== node.id
        );
        // Find which nodes still have at least one edge
        const connectedIds = new Set();
        remainingLinks.forEach(l => {
          connectedIds.add(l.source.id);
          connectedIds.add(l.target.id);
        });
        // Keep only nodes that are connected (or remove isolated ones)
        const remainingNodes = data.nodes.filter(n =>
          n.id !== node.id && connectedIds.has(n.id)
        );
        Graph.graphData({ nodes: remainingNodes, links: remainingLinks });
      }
    });
